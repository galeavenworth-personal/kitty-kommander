# Cockpit foundation — remote control + session management
allow_remote_control    socket-only
listen_on               unix:/tmp/kitty-kommander

# Shell integration
shell_integration enabled

# Scrollback
scrollback_lines 10000

# Tab bar
tab_bar_style powerline
tab_title_template "{index}: {title}"

# Layouts
enabled_layouts tall,stack,grid,splits

# Don't prompt on close
confirm_os_window_close 0

# Cockpit session launcher (F7 then A)
map f7>a launch --type=os-window kitty --override font_size=8 --session ~/.config/kitty/sessions/kommander.kitty-session
# Save current session state (F7 then S)
map f7>s save_as_session --relocatable --use-foreground-process
