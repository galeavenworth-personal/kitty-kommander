# Cockpit foundation — remote control + session management
# Per-instance listen socket is set by launch-cockpit.sh via --listen-on.
# This fallback covers non-kommander kitty windows.
allow_remote_control    socket-only
listen_on               unix:/tmp/kitty-default

# Shell integration
shell_integration enabled

# Scrollback
scrollback_lines 10000

# Tab bar
tab_bar_style powerline
tab_title_template "{index}: {title}"

# Layouts
enabled_layouts tall,stack,grid,splits

# Don't prompt on close
confirm_os_window_close 0

# Cockpit session launcher (F7 then A) — launches parallel-safe instance
map f7>a launch --type=background --cwd=current kitty-kommander
# Save current session state (F7 then S)
map f7>s save_as_session --relocatable --use-foreground-process

# kitty-scrollback.nvim
action_alias kitty_scrollback_nvim kitten '/home/galeavenworth/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
map kitty_mod+h kitty_scrollback_nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
